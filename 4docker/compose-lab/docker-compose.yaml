version: '3.8'
services:

  mysql:
    image: mysql:8
    container_name: compose-mysql
    environment:
      MYSQL_ROOT_PASSWORD: composepwd
      MYSQL_DATABASE: composelab
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppwd
    volumes:
      - compose_mysql_data:/var/lib/mysql
    ports:
      - '3308:3306'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: nginx:latest
    container_name: compose-web
    ports:
      - '8081:80'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  compose_mysql_data: